<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <!-- SVG favicon for modern browsers -->
        <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/quest_tracker_logo.svg" />
        <!-- Fallback PNG favicon for older browsers -->
        <link rel="icon" type="image/png" href="%PUBLIC_URL%/quest_tracker_logo.png" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#000000" />
        <meta
            name="description"
            content="Task Trek — gamified task tracking. Turn your to-dos into RPG quests, earn XP, and play through your own make-your-own-adventure campaigns."
        />
        <link rel="apple-touch-icon" href="%PUBLIC_URL%/quest_tracker_logo.png" />

        <!-- Canonical + social sharing (Open Graph / Twitter) -->
        <link rel="canonical" href="https://tasktrek.nl/" />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://tasktrek.nl/" />
        <meta property="og:site_name" content="Task Trek" />
        <meta property="og:title" content="Task Trek — gamified quest-based task tracking" />
        <meta
            property="og:description"
            content="Turn your to-dos into RPG quests, earn XP, and play through your own make-your-own-adventure campaigns."
        />
        <meta property="og:image" content="https://tasktrek.nl/quest_tracker_logo.png" />
        <meta name="twitter:card" content="summary" />
        <meta name="twitter:title" content="Task Trek — gamified quest-based task tracking" />
        <meta
            name="twitter:description"
            content="Turn your to-dos into RPG quests, earn XP, and play through your own make-your-own-adventure campaigns."
        />
        <meta name="twitter:image" content="https://tasktrek.nl/quest_tracker_logo.png" />
        <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
        <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
        <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
        <title>Task Trek</title>
        <!-- Self-hosted font (no third-party request to Google = no IP leak / GDPR concern) -->
        <link
            rel="preload"
            href="%PUBLIC_URL%/fonts/press-start-2p.woff2"
            as="font"
            type="font/woff2"
            crossorigin
        />
        <link
            rel="preload"
            href="%PUBLIC_URL%/fonts/pixelcastle/Pixelcastle-Regular.woff2"
            as="font"
            type="font/woff2"
            crossorigin
        />
        <link
            rel="preload"
            href="%PUBLIC_URL%/fonts/RetroByte.ttf"
            as="font"
            type="font/ttf"
            crossorigin
        />
        <style>
            @font-face {
                font-family: 'Press Start 2P';
                font-style: normal;
                font-weight: 400;
                font-display: swap;
                src: url('%PUBLIC_URL%/fonts/press-start-2p.woff2')
                    format('woff2');
            }
            @font-face {
                font-family: 'Pixelcastle';
                font-style: normal;
                font-weight: 400;
                font-display: swap;
                src: url('%PUBLIC_URL%/fonts/pixelcastle/Pixelcastle-Regular.woff2')
                        format('woff2'),
                    url('%PUBLIC_URL%/fonts/pixelcastle/Pixelcastle-Regular.woff')
                        format('woff');
            }
            @font-face {
                font-family: 'RetroByte';
                font-style: normal;
                font-weight: 400;
                font-display: swap;
                src: url('%PUBLIC_URL%/fonts/RetroByte.ttf') format('truetype');
            }
        </style>
        <script>
            (function bootstrapTheme() {
                try {
                    var storedTheme = localStorage.getItem('theme') ||
                        'neon_arcade';
                    document.documentElement.setAttribute(
                        'data-theme',
                        storedTheme,
                    );
                } catch (error) {
                    document.documentElement.setAttribute(
                        'data-theme',
                        'neon_arcade',
                    );
                }
                document.documentElement.setAttribute('data-theme-ready', 'false');
            })();
        </script>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
        <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
    </body>
</html>
